<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Madhushala AI Campaign Generator</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  width: 380px;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
  animation: fadeIn 0.8s ease;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-size: 14px;
}

select {
  width: 100%;
  padding: 10px;
  margin: 8px 0 15px;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #16a34a;
}

#status {
  margin-top: 15px;
  text-align: center;
}

.progress {
  width: 100%;
  height: 5px;
  background: #334155;
  border-radius: 5px;
  overflow: hidden;
  margin-top: 10px;
  display: none;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: width 0.4s;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h2>🚀 AI Campaign Generator</h2>

  <form id="form">

    <label>Campaign Goal</label>
    <select id="campaign_goal">
      <option>Highlight stock leakage and generate demo requests</option>
      <option>Generate demo requests</option>
      <option>Convert manual billing shops</option>
      <option>GST & Excise compliance awareness</option>
    </select>

    <label>Tone</label>
    <select id="tone">
      <option>fear</option>
      <option>professional</option>
      <option>emotional</option>
      <option>direct sales</option>
    </select>

    <label>Language</label>
    <select id="language">
      <option>Hinglish</option>
      <option>Hindi</option>
      <option>English</option>
    </select>

    <label>Focus Angle</label>
    <select id="focus_angle">
      <option>Inventory loss</option>
      <option>GST compliance</option>
      <option>Fast billing</option>
      <option>Profit increase</option>
    </select>

    <button type="submit">Generate 🚀</button>
  </form>

  <div class="progress">
    <div class="progress-bar" id="bar"></div>
  </div>

  <p id="status"></p>
</div>

<script>
const form = document.getElementById('form');
const statusText = document.getElementById('status');
const progress = document.querySelector('.progress');
const bar = document.getElementById('bar');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // Start UI feedback
  statusText.innerText = "⏳ Generating campaign...";
  progress.style.display = "block";
  bar.style.width = "10%";

  const data = {
    campaign_goal: document.getElementById('campaign_goal').value,
    tone: document.getElementById('tone').value,
    language: document.getElementById('language').value,
    focus_angle: document.getElementById('focus_angle').value
  };

  console.log("📤 Sending data:", data);

  try {
    bar.style.width = "40%";

    const res = await fetch("https://koushik989.app.n8n.cloud/webhook-test/yt/uploads", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    bar.style.width = "80%";

    if (!res.ok) {
      throw new Error("Server error");
    }

    const result = await res.json();
    console.log("✅ Response:", result);

    bar.style.width = "100%";
    statusText.innerText = "✅ Campaign generated successfully! Check your email or sheet.";

  } catch (err) {
    console.error("❌ Error:", err);
    statusText.innerText = "❌ Failed to generate campaign. Check console.";
    bar.style.width = "0%";
  }

  setTimeout(() => {
    progress.style.display = "none";
    bar.style.width = "0%";
  }, 2000);
});
</script>

</body>
</html>
