<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Studio Lite</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .progress-container { display: none; margin: 20px 0; }
        progress { width: 100%; height: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>
    <h1>🎥 YouTube Video Manager</h1>
    
    <div class="card">
        <h3>Step 1: Connection</h3>
        <a href="http://localhost:8000/login"><button>🔗 Connect YouTube Account</button></a>
    </div>

    <form id="ytForm">
        <div class="card">
            <h3>Step 2: Video File & Basics</h3>
            <label>Select Video File</label>
            <input type="file" id="videoFile" accept="video/*" required>
            
            <label>Video Title</label>
            <input type="text" id="title" maxlength="100" placeholder="Enter title..." required>
            
            <label>Description</label>
            <textarea id="description" rows="5" placeholder="Tell viewers about your video"></textarea>
        </div>

        <div class="card grid">
            <div>
                <h3>Step 3: Optimization</h3>
                <label>Tags (Comma separated)</label>
                <input type="text" id="tags" placeholder="tutorial, tech, vlog">

                <label>Category</label>
                <select id="categoryId">
                    <option value="22">People & Blogs</option>
                    <option value="20">Gaming</option>
                    <option value="27">Education</option>
                    <option value="24">Entertainment</option>
                    <option value="10">Music</option>
                    <option value="28">Science & Technology</option>
                </select>
            </div>
            <div>
                <h3>Step 4: Visibility</h3>
                <label>Privacy</label>
                <select id="privacy">
                    <option value="public">Public (Instant)</option>
                    <option value="unlisted">Unlisted</option>
                    <option value="private">Private (Required for Scheduling)</option>
                </select>

                <label>Schedule Publication (Optional)</label>
                <input type="datetime-local" id="publishAt">
                <small>Note: Only works if Privacy is set to 'Private'</small>
            </div>
        </div>

        <div class="card">
            <label style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="madeForKids"> 
                <span>This video is "Made for Kids" (COPA)</span>
            </label>
            <br>
            <button type="submit" style="width: 100%; background: #cc0000; color: white;">🚀 Upload to YouTube</button>
        </div>
    </form>

    <div id="statusArea" class="progress-container">
        <h4 id="statusText">Uploading...</h4>
        <progress id="uploadProgress" value="0" max="100"></progress>
    </div>

    <script>
        document.getElementById('ytForm').onsubmit = async (e) => {
            e.preventDefault();
            const statusArea = document.getElementById('statusArea');
            const progress = document.getElementById('uploadProgress');
            const statusText = document.getElementById('statusText');

            statusArea.style.display = 'block';
            
            const formData = new FormData();
            formData.append('file', document.getElementById('videoFile').files[0]);
            formData.append('title', document.getElementById('title').value);
            formData.append('description', document.getElementById('description').value);
            formData.append('tags', document.getElementById('tags').value);
            formData.append('category_id', document.getElementById('categoryId').value);
            formData.append('privacy_status', document.getElementById('privacy').value);
            formData.append('made_for_kids', document.getElementById('madeForKids').checked);

            const schedule = document.getElementById('publishAt').value;
            if (schedule) {
                formData.append('publish_at', new Date(schedule).toISOString());
            }

            try {
                const response = await fetch('http://localhost:8000/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (response.ok) {
                    statusText.innerText = "✅ Success! Video ID: " + data.video_id;
                    progress.value = 100;
                } else {
                    statusText.innerText = "❌ Error: " + data.detail;
                }
            } catch (err) {
                statusText.innerText = "❌ Connection failed.";
            }
        };
    </script>
</body>
</html>
